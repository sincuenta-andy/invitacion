<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Cuenta Andy</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="arriba">
        <img src="svg/flores arriba.svg" alt="" width="100%">
        <img class="textoArriba" src="svg/texto inicial.svg" alt="">
    </div>
    <div class="texto">
        <img src="svg/invito.svg" alt="">
        <img class="fecha" src="svg/fecha.svg" alt="">
        <img src="svg/direccion 1.svg" alt="">
        <a
            href="https://www.google.com/maps/place/La+Rural+HD/@-34.6370911,-58.6062598,17z/data=!3m1!4b1!4m6!3m5!1s0x95bcb8813b2dd341:0xd5dc3d4e23eeb7e5!8m2!3d-34.6370955!4d-58.6036849!16s%2Fg%2F11bz00_svt?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D">
            <img src="svg/direccion 2.svg" alt=""></a>
        <img src="svg/fotos 1.svg" alt="">
        <a href="https://drive.google.com/drive/u/5/folders/1SnTgqoi77uRfkNK5L9wAE9cZACuhos30">
            <img src="svg/fotos 2.svg" alt=""></a>
        <img src="svg/fotos 3.svg" alt="">
    </div>

    <img src="svg/andy.svg" alt="">
    <!--     <img src="svg/flores 1.svg" alt="">
 -->
    <div id="countdown-container">
        <p class="titulo">No lo olvides! Faltan</p>
        <div id="countdown">
            <div class="bloque">
                <span id="dias">00</span>
                <p>DÍAS</p>
            </div>

            <div class="separador">:</div>

            <div class="bloque">
                <span id="horas">00</span>
                <p>HORAS</p>
            </div>

            <div class="separador">:</div>

            <div class="bloque">
                <span id="minutos">00</span>
                <p>MIN</p>
            </div>
        </div>
        <img src="svg/flores fin.svg" alt="" width="100%" height="auto">
    </div>
    <script>
        const fechaFinal = new Date("June 13, 2026 21:00:00").getTime();
        function actualizarContador() {
            const ahora = new Date().getTime();
            const diferencia = fechaFinal - ahora;
            if (diferencia <= 0) {
                document.getElementById("dias").innerText = "00";
                document.getElementById("horas").innerText = "00";
                document.getElementById("minutos").innerText = "00";
                return;
            }
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
            const minutos = Math.floor((diferencia / (1000 * 60)) % 60);

            document.getElementById("dias").innerText = dias.toString().padStart(2, '0');
            document.getElementById("horas").innerText = horas.toString().padStart(2, '0');
            document.getElementById("minutos").innerText = minutos.toString().padStart(2, '0');
        }
        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>

</body>

</html>
